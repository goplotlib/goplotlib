name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read  # default deny-all override; jobs add what they need

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HUGO_VERSION: 0.158.0
      HUGO_ENVIRONMENT: production
      HUGO_CACHEDIR: /tmp/hugo_cache
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false  # no go.sum at root (zero-dependency); Hugo modules cached separately

      - name: Install Node.js dependencies
        run: |
          if [[ -f docs/package-lock.json || -f docs/package.json ]]; then
            cd docs && npm ci
          fi

      - name: Cache Hugo modules
        uses: actions/cache@v5
        with:
          path: /tmp/hugo_cache
          key: ${{ runner.os }}-hugomod-${{ hashFiles('docs/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      - name: Verify generated docs are up to date
        run: go run ./cmd/gendocs --check

      - name: Build with Hugo
        run: |
          cd docs && hugo \
            --gc \
            --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write      # needed to deploy to Pages
      id-token: write   # needed by actions/deploy-pages for OIDC auth
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
